stages:
  - build
  - bundle
  - release

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

build-main:
  stage: build
  image: gradle:8.11-jdk11
  script:
  - chmod +x gradlew
  - gradle -PsnapshotVersion=$CI_COMMIT_SHORT_SHA :FurnitureLib-Core:build :FurnitureLib-Paper:build
  artifacts:
    paths:
    - FurnitureLib-Core/build/libs/*.jar
    - FurnitureLib-Paper/build/libs/*.jar
    expire_in: 1 week

build-display:
  stage: build
  image: gradle:8.11-jdk17
  script:
  - chmod +x gradlew
  - gradle -PsnapshotVersion=$CI_COMMIT_SHORT_SHA -PcjavaVersion=17 :FurnitureLib-1_19_4:build
  artifacts:
    paths:
    - FurnitureLib-1_19_4/build/libs/*.jar
    expire_in: 1 week

build-folia:
  stage: build
  image: gradle:8.11-jdk21
  script:
  - chmod +x gradlew
  - gradle -PsnapshotVersion=$CI_COMMIT_SHORT_SHA -PcjavaVersion=21 :FurnitureLib-Folia:build
  artifacts:
    paths:
    - FurnitureLib-Folia/build/libs/*.jar
    expire_in: 1 week

build-sulfur:
  stage: build
  image: gradle:9.1-jdk25
  script:
  - chmod +x gradlew
  - gradle -PsnapshotVersion=$CI_COMMIT_SHORT_SHA -PcjavaVersion=25 :FurnitureLib-26_2:build
  artifacts:
    paths:
    - FurnitureLib-26_2/build/libs/*.jar
    expire_in: 1 week

bundle:
  stage: bundle
  image: gradle:8.11-jdk11
  needs:
    - job: build-main
      artifacts: true
    - job: build-display
      artifacts: true
    - job: build-folia
      artifacts: true
    - job: build-sulfur
      artifacts: true   
  script:
    - chmod +x ./gradlew || true
    - gradle --version
    - gradle shadowJar
  artifacts:
    paths:
      - build/libs/FurnitureLib.jar
    expire_in: 1 week

release-modrinth:
  stage: release
  image: gradle:8.11-jdk11
  needs:
    - job: bundle
      artifacts: true
  script:
    - chmod +x ./gradlew || true
    - gradle modrinth --no-build

publish-github:
  stage: release
  image: gradle:8.11-jdk11
  needs:
    - job: bundle
      artifacts: true
  script:
    - chmod +x ./gradlew || true
    - gradle publish
  only:
    - tags