/*
 * This file was generated by the Gradle 'init' task.
 */

buildscript {
  repositories {
    maven {
      url "https://plugins.gradle.org/m2/"
    }

  }
  dependencies {
    classpath "com.gradleup.shadow:shadow-gradle-plugin:9.2.2"
  }
}

apply plugin: 'de.Ste3et_C0st.furniture.java-conventions'
apply plugin: 'com.gradleup.shadow'

dependencies {
    implementation project(path: ':FurnitureLib-Core', configuration: 'shadow')
    implementation project(path: ':FurnitureLib-1_19_4')
    implementation project(path: ':FurnitureLib-Paper')
    //implementation project(path: ':FurnitureLib-Folia')
}

tasks {
   jar {
	   enabled = true
   }
   
   assemble{
    	dependsOn(shadowJar)
   }
}

def moduleJars = fileTree("$rootDir").matching {
    include "FurnitureLib-Core/build/libs/*.jar"
    include "FurnitureLib-Paper/build/libs/*.jar"
    include "FurnitureLib-1_19_4/build/libs/*.jar"
    include "FurnitureLib-Folia/build/libs/*.jar"
    exclude "*-sources.jar"
    exclude "*-javadoc.jar"
}

def foliaJar = file("$rootDir/FurnitureLib-Folia/build/libs")
    .listFiles()
    ?.find { it.name.endsWith(".jar") && !it.name.contains("sources") && !it.name.contains("javadoc") }

shadowJar {
    archiveClassifier.set('')
    archiveVersion.set('')

    mergeServiceFiles()

    dependencies {
        exclude(dependency('com.zaxxer:.*'))
        exclude(dependency('net.kyori:.*'))
    }

    from(fileTree("$rootDir").matching {
        include "FurnitureLib-Core/build/libs/*.jar"
        include "FurnitureLib-Paper/build/libs/*.jar"
        include "FurnitureLib-1_19_4/build/libs/*.jar"
        exclude "*-sources.jar"
        exclude "*-javadoc.jar"
    }.collect { zipTree(it) })
    
    if (foliaJar != null) {
        println ">>> Including Folia JAR: $foliaJar"
        from(zipTree(foliaJar))
    } else {
        println ">>> WARNING: Folia JAR NOT FOUND"
    }
}

subprojects.each {
	subproject -> {
		evaluationDependsOn(subproject.path)
	}
}