/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
	id "maven-publish"
    id "com.gradleup.shadow" version "9.1.0"
    id "com.modrinth.minotaur" version "2.+"
}

apply plugin: 'de.Ste3et_C0st.furniture.java-conventions'

dependencies {
    implementation project(path: ':FurnitureLib-Core', configuration: 'shadow')
    implementation project(path: ':FurnitureLib-Paper')
}

tasks {
   jar {
	   enabled = true
   }
   
   assemble{
    	dependsOn(shadowJar)
   }
}

def moduleJars = fileTree("$rootDir").matching {
    include "FurnitureLib-Core/build/libs/*.jar"
    include "FurnitureLib-Paper/build/libs/*.jar"
    include "FurnitureLib-1_19_4/build/libs/*.jar"
    include "FurnitureLib-Folia/build/libs/*.jar"
    exclude "*-sources.jar"
    exclude "*-javadoc.jar"
}

def foliaJar = file("$rootDir/FurnitureLib-Folia/build/libs")
    .listFiles()
    ?.find { it.name.endsWith(".jar") && !it.name.contains("sources") && !it.name.contains("javadoc") }

def displayFeature = file("$rootDir/FurnitureLib-1_19_4/build/libs")
    .listFiles()
    ?.find { it.name.endsWith(".jar") && !it.name.contains("sources") && !it.name.contains("javadoc") }

tasks.shadowJar {
    if (System.getenv("CI") == null) {
        dependsOn(
            ":FurnitureLib-Core:build",
            ":FurnitureLib-Paper:build",
            ":FurnitureLib-1_19_4:build",
            ":FurnitureLib-Folia:build"
        )
    }
}

shadowJar {
    archiveClassifier.set('')
    archiveVersion.set('')

    mergeServiceFiles()
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    dependencies {
        exclude(dependency('com.zaxxer:.*'))
        exclude(dependency('net.kyori:.*'))
    }
    
    zip64 true

    doFirst {
        def jars

        if (System.getenv("CI") != null) {
            println ">>> CI MODE"

            jars = fileTree("$rootDir").matching {
                include "FurnitureLib-*/build/libs/*.jar"
            }.files.findAll {
                it.name.endsWith(".jar") &&
                !it.name.contains("sources") &&
                !it.name.contains("javadoc") &&
                !it.name.contains("FurnitureLib.jar")
            }

        } else {
            println ">>> LOCAL MODE"

            jars = fileTree("$rootDir").matching {
                include "FurnitureLib-*/build/libs/*.jar"
            }.files.findAll {
                it.name.endsWith(".jar") &&
                !it.name.contains("sources") &&
                !it.name.contains("javadoc") &&
                !it.name.contains("FurnitureLib.jar")
            }
        }

        if (jars.isEmpty()) {
            println ">>> WARNING: NO JARS FOUND"
        }

        jars.each {
            println ">>> Including: ${it.absolutePath}"
            from(zipTree(it))
        }
    }
}

modrinth {
    token = System.getenv("MODRINTH_TOKEN")
    projectId = "DqcgUFzu"
    versionNumber = project.version
    versionType = "release"

    uploadFile = shadowJar
    
    gameVersions = [
	    "1.14", "1.14.1", "1.14.2", "1.14.3", "1.14.4",
	    "1.15", "1.15.1", "1.15.2",
	    "1.16", "1.16.1", "1.16.2", "1.16.3", "1.16.4", "1.16.5",
	    "1.17", "1.17.1",
	    "1.18", "1.18.1", "1.18.2",
	    "1.19", "1.19.1", "1.19.2", "1.19.3", "1.19.4",
	    "1.20", "1.20.1", "1.20.2", "1.20.3", "1.20.4", "1.20.5", "1.20.6",
	    "1.21", "1.21.1", "1.21.2", "1.21.3", "1.21.4",
	    "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9", "1.21.10", "1.21.11",
	    "26.1", "26.1.1", "26.1.2"
	]
    
    loaders = ["paper", "spigot", "folia"]
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact(tasks.shadowJar)
            groupId = "de.ste3et"
            artifactId = "furniturelib"
            version = project.version
            artifacts = [tasks.shadowJar]
        }
    }

    repositories {
    	mavenLocal()
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/Ste3et/FurnitureLib")

            credentials {
                username = "Ste3et"
                password = project.findProperty("gpr.key") ?: System.getenv("GITHUB_TOKEN")
            }
        }
    }
}

subprojects.each {
	subproject -> {
		evaluationDependsOn(subproject.path)
	}
}